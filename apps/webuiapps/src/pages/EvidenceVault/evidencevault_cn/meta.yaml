app_id: 13
app_name: evidencevault
app_display_name: 档案库
version: "1.0.0"
description: >
  档案库应用，纯只读模式。所有档案数据预先存储在云端，前端启动时一次性拉取。
  用户和 Agent 均不进行写操作，数据为静态只读。无 Agent 下发指令。
displayDesc: >
  数字档案库，分类浏览和搜索证据档案，支持详情查看，随时调阅重要资料。

