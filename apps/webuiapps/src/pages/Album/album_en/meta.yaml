app_id: 8
app_name: album
app_display_name: Album
version: "1.0.0"
description: >
  Album app, read-only browsing mode. Image data stored in cloud images/ directory.
  Only supports REFRESH action to notify frontend to re-sync image list, no write actions.
displayDesc: >
  A beautiful photo gallery — browse your photos in a grid layout with full-size preview on click.

# ============================================================
# The following actions are only for Agent → Frontend command dispatch.
# After the Agent adds/deletes image files on the cloud, it can dispatch REFRESH to notify the frontend to re-sync.
# ============================================================

actions:
  - type: REFRESH
    name: Refresh Album
    description: >
      After the Agent has added or deleted image files on the cloud, this action is dispatched to notify the frontend to re-sync and refresh the list.
      Upon receiving it, the frontend calls initFromCloud and reloads all image metadata under /images.
    params: []
